services:
  hookd:
    build: .
    volumes:
      - hookd-data:/data
    environment:
      - HOOKD_PUBLIC_URL=https://${HOOKD_DOMAIN}
      - HOOKD_ADMIN_TOKEN=${HOOKD_ADMIN_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4801/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - HOOKD_DOMAIN=${HOOKD_DOMAIN}
    restart: unless-stopped

volumes:
  hookd-data:
  caddy-data:
  caddy-config:
